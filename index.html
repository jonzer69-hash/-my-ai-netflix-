<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Cinema</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; }
    .row { scrollbar-width: none; }
    .row::-webkit-scrollbar { display: none; }
    .thumbnail { transition: transform 0.4s ease, box-shadow 0.4s ease; }
    .thumbnail:hover { transform: scale(1.12); box-shadow: 0 20px 40px rgba(0,0,0,0.8); z-index: 20; }
    .hero-text { text-shadow: 0 4px 20px rgba(0,0,0,0.9); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- HEADER -->
  <header class="fixed top-0 w-full bg-black/80 backdrop-blur-md z-50 border-b border-zinc-800">
    <div class="max-w-screen-2xl mx-auto px-10 py-4 flex items-center justify-between">
      <div class="flex items-center gap-10">
        <h1 class="text-4xl font-bold tracking-tighter text-red-600">My AI</h1>
        <nav class="flex gap-8 text-sm font-medium">
          <a href="#" class="hover:text-red-500 transition">Home</a>
          <a href="#" class="hover:text-red-500 transition">My Videos</a>
          <a href="#" class="hover:text-red-500 transition">New Releases</a>
          <a href="#" class="hover:text-red-500 transition">My List</a>
        </nav>
      </div>
      
      <div class="flex items-center gap-6">
        <input id="search" type="text" placeholder="Search videos..." 
               class="bg-zinc-900 text-sm px-5 py-2 rounded-full w-72 focus:outline-none focus:ring-2 focus:ring-red-600">
        <div class="w-8 h-8 bg-zinc-700 rounded-full flex items-center justify-center cursor-pointer hover:bg-zinc-600">
          👤
        </div>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <div class="relative h-screen bg-cover bg-center" style="background-image: url('https://img.youtube.com/vi/IrNwWee_tfY/maxresdefault.jpg')">
    <div class="absolute inset-0 bg-gradient-to-r from-black via-black/70 to-transparent"></div>
    <div class="absolute bottom-1/3 left-12 max-w-xl">
      <p class="text-red-600 font-bold tracking-widest mb-2">NEW AI VIDEO</p>
      <h2 class="hero-text text-7xl font-bold leading-none mb-6">My First AI Short</h2>
      <button onclick="playVideo('IrNwWee_tfY')" 
              class="bg-white hover:bg-gray-200 text-black px-12 py-4 rounded font-bold text-xl flex items-center gap-3 transition">
        ▶ PLAY NOW
      </button>
    </div>
  </div>

  <!-- ROWS -->
  <div class="max-w-screen-2xl mx-auto px-10 pb-20 -mt-24 relative z-10 space-y-12">

    <div>
      <h3 class="text-2xl font-semibold mb-6">My AI Videos</h3>
      <div id="row1" class="flex gap-4 overflow-x-auto row">
        <div onclick="playVideo('IrNwWee_tfY')" class="thumbnail min-w-[320px] cursor-pointer rounded overflow-hidden">
          <img src="https://img.youtube.com/vi/IrNwWee_tfY/hqdefault.jpg" class="w-full">
        </div>
      </div>
    </div>

    <div>
      <h3 class="text-2xl font-semibold mb-6">Trending Right Now</h3>
      <div id="row2" class="flex gap-4 overflow-x-auto row">
        <!-- Add more thumbnails here later -->
      </div>
    </div>

    <div>
      <h3 class="text-2xl font-semibold mb-6">New Releases</h3>
      <div id="row3" class="flex gap-4 overflow-x-auto row">
        <!-- Add more thumbnails here later -->
      </div>
    </div>

    <div>
      <h3 class="text-2xl font-semibold mb-6">Recommended For You</h3>
      <div id="row4" class="flex gap-4 overflow-x-auto row">
        <!-- Add more thumbnails here later -->
      </div>
    </div>

  </div>

  <!-- VIDEO PLAYER -->
  <div id="modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50">
    <div class="max-w-6xl w-full px-6">
      <button onclick="closeModal()" class="absolute top-8 right-8 text-5xl text-white hover:text-red-500">✕</button>
      <iframe id="player" class="w-full aspect-video rounded-xl" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    function playVideo(id) {
      document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
      document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() {
      document.getElementById('player').src = '';
      document.getElementById('modal').classList.add('hidden');
    }

    // Live search across all rows
    document.getElementById('search').addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.thumbnail').forEach(el => {
        el.style.display = term === '' ? 'block' : 'none';
      });
    });
  </script>
</body>
</html>
